name: Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  core:
    name: Core Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libusb-1.0-0-dev

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -v -count=1 ./internal/...

      - name: Build core
        run: go build -o build/bin/BS2PRO-Core ./cmd/core/

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: bun run build

  gui:
    name: GUI (Wails)
    runs-on: ubuntu-latest
    needs: [core, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
          sudo apt-get install -y libudev-dev libusb-1.0-0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Build GUI
        run: wails build
